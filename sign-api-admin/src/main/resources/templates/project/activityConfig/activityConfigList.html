<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('活动分类配置列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>语言：</label>
                                <select name="lang" class="form-control" type="text">
                                    <option value="">全部</option>
                                    <option value="zh_CN">中文</option>
                                    <option value="en_US">英文</option>
                                    <option value="ko_KR">韩文</option>
                                    <option value="vi_VN">越文</option>
                                    <option value="ru_RU">俄文</option>
                                    <option value="pt_PT">葡萄牙</option>
                                </select>
                            </li>
                            <!--<li class="select-time">
                                <label>时间：</label>
                                <input type="text" style="width:150px;" class="time-input" id="startTime" autocomplete="off" placeholder="开始时间" name="params[beginTime]"/>
                                <span>-</span>
                                <input type="text" style="width:150px;" class="time-input" id="endTime" autocomplete="off" placeholder="结束时间" name="params[endTime]"/>
                            </li>-->
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="project:activityConfig:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <!--<a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="project:activityConfig:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="project:activityConfig:export">
                    <i class="fa fa-download"></i> 导出
                </a>-->
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('project:activityConfig:edit')}]];
        var removeFlag = [[${@permission.hasPermi('project:activityConfig:remove')}]];
        var prefix = ctx + "project/activityConfig";

        layui.use('laydate', function(){
            var laydate = layui.laydate;
            //日期时间选择器
            laydate.render({
                elem: '#endTime'
                ,type: 'datetime'
            });

            laydate.render({
                elem: '#startTime'
                ,type: 'datetime'
            });
        })

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "活动分类配置",
                columns: [{
                    checkbox: true
                },

                {
                    field: 'activityName',
                    title: '分类名称'
                },
                {
                    field: 'lang',
                    title: '语言',
                    formatter: function(value, row, index) {
                        if(value === "zh_CN"){
                            return "中文";
                        }else if(value === "en_US"){
                            return "英文";
                        }else if(value === "ko_KR"){
                            return "韩文";
                        }else if(value === "vi_VN"){
                            return "越文";
                        }else if(value === "ru_RU"){
                            return "俄文";
                        }else if(value === "pt_PT"){
                            return "葡萄牙";
                        }

                    }
                },
                    {
                        field: 'createTime',
                        title: '时间'
                    },
                    {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
